<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>OAuth Client</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f4f4f4;
    }

    .container {
      width: 400px;
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow:
        0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
      color: #333;
    }

    p {
      margin-bottom: 30px;
      color: #666;
      line-height: 1.5;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #1d4ed8;
    }

    #output {
      margin-top: 25px;
      text-align: left;
      background: #f1f1f1;
      padding: 15px;
      border-radius: 8px;
      font-size: 14px;
      overflow-x: auto;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>OAuth Client App</h1>

    <p>
      Login using your custom OAuth2 /
      OpenID Connect Provider
    </p>

    <button id="loginBtn">
      Login with OIDC Provider
    </button>

    <pre id="output"></pre>

  </div>

  <script>

    // ==========================================
    // OAuth Client Configuration
    // ==========================================

    const CLIENT_ID = "my-client";

    const REDIRECT_URI =
      "http://localhost:5000/callback.html";

    const AUTH_SERVER =
      "http://localhost:5000";

    // ==========================================
    // Login Button
    // ==========================================

    document
      .getElementById("loginBtn")
      .addEventListener("click", () => {

        const params = new URLSearchParams({

          client_id: CLIENT_ID,

          redirect_uri: REDIRECT_URI,

          response_type: "code",

          scope: "openid profile email",

          state: "123456"

        });

        const authURL =
          `${AUTH_SERVER}/o/authorize?${params}`;

        window.location.href = authURL;
      });

  </script>

</body>
</html>
