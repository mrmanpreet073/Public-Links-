<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dark Signup Form</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#0f172a;
    }

    .signup-container{
      width:420px;
      background:#1e293b;
      padding:35px;
      border-radius:14px;
      box-shadow:0 0 25px rgba(0,0,0,0.5);
      border:1px solid #334155;
    }

    .signup-container h2{
      text-align:center;
      margin-bottom:25px;
      color:#f8fafc;
      font-size:28px;
    }

    .form-group{
      margin-bottom:18px;
    }

    .form-group label{
      display:block;
      margin-bottom:8px;
      color:#cbd5e1;
      font-size:14px;
      font-weight:600;
    }

    .form-group input{
      width:100%;
      padding:12px;
      border:1px solid #475569;
      border-radius:8px;
      background:#0f172a;
      color:#f8fafc;
      font-size:14px;
      transition:0.3s;
    }

    .form-group input::placeholder{
      color:#94a3b8;
    }

    .form-group input:focus{
      outline:none;
      border-color:#3b82f6;
      box-shadow:0 0 8px rgba(59,130,246,0.4);
    }

    .checkbox-group{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:22px;
      color:#cbd5e1;
      font-size:14px;
    }

    .checkbox-group input{
      accent-color:#3b82f6;
    }

    .signup-btn{
      width:100%;
      padding:13px;
      border:none;
      border-radius:8px;
      background:#3b82f6;
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    .signup-btn:hover{
      background:#2563eb;
      transform:translateY(-1px);
    }

    .footer-text{
      text-align:center;
      margin-top:18px;
      color:#94a3b8;
      font-size:14px;
    }

    .footer-text a{
      color:#60a5fa;
      text-decoration:none;
    }

    .footer-text a:hover{
      text-decoration:underline;
    }
  </style>
</head>
<body>

  <div class="signup-container">
    <h2>Create Account</h2>

    <form action="/signup" method="POST">

      <!-- First Name -->
      <div class="form-group">
        <label for="firstName">First Name</label>
        <input 
          type="text" 
          id="firstName" 
          name="firstName"
          maxlength="25"
          placeholder="Enter first name"
          required
        >
      </div>

      <!-- Last Name -->
      <div class="form-group">
        <label for="lastName">Last Name</label>
        <input 
          type="text" 
          id="lastName" 
          name="lastName"
          maxlength="25"
          placeholder="Enter last name"
          required
        >
      </div>

      

      <!-- Email -->
      <div class="form-group">
        <label for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          name="email"
          maxlength="322"
          placeholder="Enter your email"
          required
        >
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password"
          minlength="6"
          placeholder="Enter password"
          required
        >
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input 
          type="password" 
          id="confirmPassword" 
          name="confirmPassword"
          placeholder="Confirm password"
          required
        >
      </div>

      <!-- Email Verified -->
     
      <button type="submit" class="signup-btn">
        Sign Up
      </button>

    </form>

    <div class="footer-text">
      Already have an account?
      <a href="#">Login</a>
    </div>

  </div>

</body>
</html>
