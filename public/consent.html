<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Consent Page</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#0f172a;
      height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;

      color:white;
    }

    .container{

      width:420px;

      background:#1e293b;

      padding:35px;

      border-radius:16px;

      box-shadow:
      0 0 20px rgba(0,0,0,0.5);
    }

    .logo{

      width:70px;
      height:70px;

      border-radius:50%;

      background:#3b82f6;

      display:flex;
      justify-content:center;
      align-items:center;

      margin:auto;
      margin-bottom:20px;

      font-size:30px;
      font-weight:bold;
    }

    h1{
      text-align:center;
      margin-bottom:10px;
    }

    .subtext{
      text-align:center;
      color:#94a3b8;
      margin-bottom:25px;
    }

    .permissions{

      background:#0f172a;

      padding:20px;

      border-radius:12px;

      margin-bottom:25px;
    }

    .permissions h3{
      margin-bottom:15px;
    }

    .permission-item{

      display:flex;
      align-items:center;

      margin-bottom:12px;

      color:#cbd5e1;
    }

    .check{
      color:#22c55e;
      margin-right:10px;
      font-size:18px;
    }

    .buttons{

      display:flex;
      gap:15px;
    }

    button{

      flex:1;

      padding:12px;

      border:none;

      border-radius:10px;

      font-size:16px;
      font-weight:bold;

      cursor:pointer;

      transition:0.3s;
    }

    .allow{

      background:#2563eb;
      color:white;
    }

    .allow:hover{
      background:#1d4ed8;
    }

    .deny{

      background:#334155;
      color:white;
    }

    .deny:hover{
      background:#475569;
    }

  </style>
</head>
<body>

  <div class="container">

    <div class="logo">
      A
    </div>

    <h1>Authorize Application</h1>

    <p class="subtext">
      This app wants permission to access your account
    </p>

    <div class="permissions">

      <h3>Permissions Requested</h3>

      <div class="permission-item">
        <span class="check">✔</span>
        Access your email address
      </div>

      <div class="permission-item">
        <span class="check">✔</span>
        Read your profile information
      </div>

      <div class="permission-item">
        <span class="check">✔</span>
        Access your profile picture
      </div>

    </div>

    <div class="buttons">

      <button class="deny" onclick="denyAccess()">
        Deny
      </button>

      <button class="allow" onclick="allowAccess()">
        Allow
      </button>

    </div>

  </div>

  <script>

    function allowAccess(){

      alert("Access Granted");

      // redirect after approval
      window.location.href = "/home";
    }

    function denyAccess(){

      alert("Access Denied");

      // redirect back
      window.location.href = "/login";
    }

  </script>

</body>
</html>
