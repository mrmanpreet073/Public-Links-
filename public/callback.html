<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>OAuth Callback</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #1e293b;
      padding: 30px;
      border-radius: 10px;
      width: 400px;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="box">

    <h2>Logging you in...</h2>

    <p id="message">
      Please wait...
    </p>

  </div>

  <script>

    // this callback page should belong to the client app, not the auth server
    // ============================================================================
    async function exchangeCode() {

      // ============================
      // Read Query Params
      // ============================

      const params = new URLSearchParams(window.location.search);
      const code = params.get("code");
      const state = params.get("state");

      if (!code) {

        document.getElementById("message").innerText = "Authorization code missing";
        return;
      }

      try {

        // ============================
        // Exchange Code For Tokens
        // ============================

        const response = await fetch("https://msa-auth.onrender.com", {

          method: "POST",

          headers: { "Content-Type": "application/json" },

          body: JSON.stringify({
            code,
            client_id: "8a0aed734e698a9f2e82ecce3940952b",
            client_secret: "YOUR_CLIENT_SECRET",
            redirect_uri: "http://localhost:5000/callback.html",
            grant_type: "authorization_code"
          })
        }
        );

        const data = await response.json();

        console.log(data);

        localStorage.setItem("access_token", data.access_token);
        localStorage.setItem("id_token", data.id_token);

        // Store In Cookie

        document.getElementById("message").innerText = "Login Successful";

        // ============================
        // Redirect User
        // ============================

        setTimeout(() => {
          // redirect to home page of client app
          window.location.href = "/home";
        }, 15000);

      } catch (error) {
        console.error(error);
        document.getElementById("message").innerText = "Login failed";
      }
    }

    exchangeCode();

  </script>

</body>

</html>
